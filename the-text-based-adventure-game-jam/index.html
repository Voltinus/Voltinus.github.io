<html>
    <head>
        <meta charset="utf-8"/>
        <style>
            * { font-family: "Lucida Console", Monaco, monospace }
            
            body  {
                margin: auto;
                overflow: hidden;
                background: #070707;
                color: #eee;
            }

            #game {
                margin: auto;
                margin-top: 100px;
                width: 600px;
                height: 400px;
            }
            
            #input {
                width: 100%;
                height: 40px;
                background: #111;
                color: #eee;
                border: 0;
                padding-left: 10px;
            }
            
            #output {
                width: 100%;
                height: 360px;
                overflow: auto;
            }
            
            @media (min-width:320px)  { /* smartphones, iPhone, portrait 480x320 phones */ }
            @media (min-width:481px)  { /* portrait e-readers (Nook/Kindle), smaller tablets @ 600 or @ 640 wide. */ }
            @media (min-width:641px)  { /* portrait tablets, portrait iPad, landscape e-readers, landscape 800x480 or 854x480 phones */ }
            @media (min-width:961px)  { /* tablet, landscape iPad, lo-res laptops ands desktops */ }
            @media (min-width:1025px) { /* big landscape tablets, laptops, and desktops */ }
            @media (min-width:1281px) { /* hi-res laptops and desktops */ }
        </style>
    </head>
    <body>

        <div id="game">
            <div id="output"></div>
            <input id="input" type="text"/>
        </div>

        <script>

            /// Input and output
            
            let output = {
                element: document.getElementById("output"),
                print: function(color, content) {
                    if(content == undefined) {
                        content = color;
                        color = undefined;
                    }
                    let elem = document.createElement("div");
                    if(color) {
                        elem.style.color = color;
                    }
                    elem.innerHTML = content;
                    this.element.appendChild(elem);
                    elem.scrollIntoView();
                },
                color: (c, text) =>
                    "<span style='color: " + c + "'>" + text + "</span"
            };

            let input = {
                element: document.getElementById("input"),
                get: () => input.element.value,
                clear: () => input.element.value = ""
            };
            input.clear();

            output.element.addEventListener("click", () => {
                input.element.focus();
            });

            input.element.addEventListener("change", () => {
                let command = input.get();
                input.clear()
                output.print(`<b>${player.name}</b>: ` + command);
                commands.exec(command);
            });

            let hotkeyMode = false;

            input.element.addEventListener("keydown", (e) => {
                if(e.key == "Tab") {
                    e.preventDefault();
                    hotkeyMode = !hotkeyMode;
                    if(hotkeyMode) {
                        input.element.value = "HOTKEY MODE";
                    } else {
                        input.clear();
                    }
                }

                if(hotkeyMode) {
                    input.element.value = "HOTKEY MODE: ";
                    commands.exec(e.key);
                }
            });

            input.element.addEventListener("keyup", (e) => {
                if(hotkeyMode) {
                    input.element.value = "HOTKEY MODE";
                    if(e.key != "Tab") input.element.value += ": " + e.key;
                }
            });


            /// Globals

            let player = {
                name: null,
                position: "start"
            };

            let commands    = {
                exec: (command) => {
                    if(command == "Tab") return;

                    let direction = null;
                    command = command.split(" ");
                    
                    switch(command[0]) {
                        case "/cls":
                        case "/clear":
                            output.element.innerHTML = "";
                            break;

                        case "enter":
                        case "go":
                        case "approach":
                            let exits = Object.keys(rooms.get(player.position).exits);
                            for(let i in exits) {
                                if(command.indexOf(exits[i]) != -1) {
                                    rooms.change(rooms.get(player.position).exits[exits[i]]);
                                }
                            }
                            
                            break;

                        default:
                            let i = -1;
                            while((i = command.indexOf("the")) != -1) command.splice(i, 1);
                            while((i = command.indexOf("at" )) != -1) command.splice(i, 1);
                            while((i = command.indexOf("on" )) != -1) command.splice(i, 1);

                            let action = rooms.get(player.position).actions[command.join(' ')];
                            if(action != undefined) {
                                output.print(action.check() ? action.text : action.afterText);
                                action.action();
                                break;
                            }

                            let dunnos = [
                                "What?",
                                "What was I going to do...?",
                                "Hmmm?"
                            ];

                            output.print("grey", dunnos[Math.floor(dunnos.length * Math.random())]);
                    }
                }
            };

            let flags = {
                list: {},
                set: (name) => flags.list[name] = true,
                unset: (name) => flags.list[name] = false,
                check: (name) => flags.list[name]
            };

            let rooms = {
                list: {
                    start: {
                        name: output.color("magenta", "Outside the Club"),
                        description: "You're in Miami, the year is 1985. It's a warm summer night. The wind is softly blowing from the sea. You're standing in front of a night club. You see a bouncer and people standing in line to get in.",
                        exits: {
                            "club": "clubEntrance",
                            "bouncer": "clubEntrance"
                        },
                        actions: {
                            "ping": {
                                text: "Pong!",
                                afterText: "Ponged!",
                                action: ()=> flags.set("pinged"),
                                check: ()=> !flags.check("pinged")
                            }
                        }
                    },

                    clubEntrance: {
                        name: "Test",
                        description: "test",
                        exits: {
                            "start": "start"
                        }
                    },

                    template: {
                        name: output.color("red", "Template"),
                        description: "You're in an empty room with a purple and black grid pattern on the walls. There's a red \"Error\" sign floating in front of you.",
                        exits: {
                            "exit1": "void",
                            "exit2": "void"
                        }
                    },
                },
                get: (id) => rooms.list[id],
                add: (id, room) => rooms.list[id] = room,
                change: (id) => {
                    player.position = id;
                    output.print("<b>" + rooms.get(id).name + "</b>");
                    output.print(rooms.get(id).description);
                    for(let i in npcs.list) {
                        if(npcs.hasOwnProperty(i)) {
                            console.log(npcs[i].position);
                            if(npcs[i].position == id) {
                                output.print(npcs[i].name + " is here.");
                            }
                        }
                    }
                }
            };

            let npcs = {
                list: {
                    dummy: {
                        name: output.color("lime", "Dummy"),
                        position: "easternRoom"
                    }
                },
                get: (id) => this.list[id],
                add: (id, npc) => this.list[id] = npc
            };


            /// Game contents

            (function(){
                player.name = "Mrozinsky";
                rooms.change("start");
            })();
            
        </script>

    </body>
</html>
